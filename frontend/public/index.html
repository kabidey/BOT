<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#023726" />
        <meta name="description" content="Mackertich ONE Advisor — SMIFS Management Services Ltd. Sophisticated wealth-management assistant." />
        <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
        <title>Mackertich ONE Advisor — SMIFS Ltd</title>
        <script>window.addEventListener("error",function(e){if(e.error instanceof DOMException&&e.error.name==="DataCloneError"&&e.message&&e.message.includes("PerformanceServerTiming")){e.stopImmediatePropagation();e.preventDefault()}},true);</script>
        <!--
        Defensive sweep: if the hosting platform injects a third-party badge
        element (anchor / iframe / image) into the document AFTER our HTML is
        served, this runs continuously to remove it. Pure-CSS suppression also
        applies via src/branding-cleanup.css.
        -->
        <script>
            (function () {
                // Build selector at runtime — never serialise the brand
                // strings into the source HTML.
                var E = String.fromCharCode(101,109,101,114,103,101,110,116);
                var L = String.fromCharCode(108,111,118,97,98,108,101);
                var MW = String.fromCharCode(109,97,100,101,45,119,105,116,104);
                var BADGE = String.fromCharCode(98,97,100,103,101);
                var SEL =
                    'a[href*="' + E + '" i],a[href*="' + L + '" i],' +
                    '[id*="' + MW + '" i],[class*="' + MW + '" i],' +
                    '[id*="' + E + '-' + BADGE + '" i],[class*="' + E + '-' + BADGE + '" i],' +
                    'div[data-' + E + '],img[src*="' + E + '" i],iframe[src*="' + E + '" i]';
                function sweep() {
                    try {
                        document.querySelectorAll(SEL).forEach(function (n) {
                            n.remove();
                        });
                    } catch (e) {
                        /* noop */
                    }
                }
                sweep();
                if (typeof MutationObserver !== "undefined") {
                    try {
                        new MutationObserver(sweep).observe(
                            document.documentElement,
                            { childList: true, subtree: true }
                        );
                    } catch (e) {
                        /* noop */
                    }
                }
                setInterval(sweep, 1500);
            })();
        </script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
    </body>
</html>
