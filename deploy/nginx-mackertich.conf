server {
    listen 80;
    listen [::]:80;
    server_name bot.pesmifs.com;

    # Reserved for certbot HTTP-01 challenge.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Frontend static build
    root /opt/mackertich/frontend-dist;
    index index.html;

    # Compress text-y responses
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # Long-cache static assets (hashed filenames from CRA build)
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA — fallthrough to index.html so React Router handles client routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Phase 29a — bullet-proof SSE pass-through
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
        # Tell nginx + any downstream proxy to never buffer this response.
        proxy_set_header X-Accel-Buffering no;
        add_header X-Accel-Buffering no always;
    }

    # Don't bother logging favicon misses
    location = /favicon.ico {
        log_not_found off;
        access_log off;
        try_files $uri =204;
    }

    # Sane upload limit — forms + admin uploads should never exceed 5 MB.
    client_max_body_size 5m;
}
